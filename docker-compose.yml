version: '3.8'

services:
  # PHP-FPM (tu aplicación Laravel)
  php:
    build: .
    env_file:
      - .env
    container_name: laravel_php
    restart: unless-stopped  # ✅ Se reinicia si falla o al reiniciar el servidor
    volumes:
      - ./:/var/www/html:cached      # Código fuente (cached para mejor rendimiento)
      - ./storage:/var/www/html/storage  # Persistencia de uploads/logs
      - /var/www/certbot:/var/www/certbot  # Volumen para Certbot (si usas HTTPS)
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - laravel-net
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx (servidor web)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped  # ✅ También se reinicia automáticamente
    ports:
      - "80:80"
      - "443:443"  # Opcional: si usas HTTPS
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - laravel-net
    depends_on:
      - php
  
  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    container_name: laravel_db
    restart: unless-stopped  # ✅ Base de datos persistente
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data  # ✅ Datos persistentes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laravel_user} -d ${POSTGRES_DB:-laravel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel-net

networks:
  laravel-net:
    driver: bridge

volumes:
  pgdata: