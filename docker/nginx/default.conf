# 1. Servidor HTTP: Redirige todo a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hakuks.duckdns.org;
    return 301 https://$host$request_uri;
}

# 2. Servidor HTTPS: El seguro
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hakuks.duckdns.org;

    # Rutas a tus certificados generados por Certbot
    ssl_certificate     /etc/letsencrypt/live/hakuks.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hakuks.duckdns.org/privkey.pem;

    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/html/public;
    index index.php index.html;

    # Validación para renovaciones futuras (Certbot necesita acceder aquí)
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        allow all;
        autoindex off;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Routing Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Importante: Le dice a Laravel que está bajo HTTPS
        fastcgi_param HTTPS on; 
        
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors on;
    }
}