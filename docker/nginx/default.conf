server {
    listen 80;
    listen [::]:80;
    
    # ✅ CORRECCIÓN 1: server_name NO lleva http:// ni /
    server_name hakuks.duckdns.org; 

    root /var/www/html/public;
    index index.php index.html;

    # ============================================
    # LET'S ENCRYPT VALIDATION (Debe ir ANTES de los bloqueos)
    # ============================================
    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
        allow all;
        autoindex off;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # SEGURIDAD: Bloquear archivos sensibles
    # ============================================
    
    # Bloquear .env, .git, etc.
    location ~ /(\.env|\.git|composer\.lock|package-lock\.json|phpinfo\.php) {
        deny all;
        return 404;
    }

    # ✅ CORRECCIÓN 2: Excluir .well-known del bloqueo general de puntos
    # Esta regla bloquea todo lo que empieza con '.', EXCEPTO .well-known
    location ~ /\.(?!well-known/) {
        deny all;
        return 404;
    }

    # ============================================
    # ARCHIVOS ESTÁTICOS
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|woff|woff2|ttf|eot|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ============================================
    # ROUTING PRINCIPAL (Laravel)
    # ============================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # PROCESAR PHP vía PHP-FPM
    # ============================================
    location ~ \.php$ {
        # Seguridad: evitar ejecución de PHP en storage/uploads
        if ($request_uri ~ "^/storage/.*\.php$") {
            return 403;
        }

        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Optimizaciones
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors on;
        
        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
        
        # Importante para Laravel detrás de proxy/HTTPS
        fastcgi_param HTTPS off; 
    }

    # ============================================
    # DENEGAR ACCESO A CARPETAS INTERNAS
    # ============================================
    location ~ ^/(storage|bootstrap)/ {
        deny all;
        return 404;
    }
}