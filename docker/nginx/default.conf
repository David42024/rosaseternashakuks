# ============================================
# CONFIGURACIÓN BASE
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name http://hakuks.duckdns.org/;  # Acepta cualquier dominio (cámbialo por tu dominio real en prod)

    

    # Root apunta a /public de Laravel
    root /var/www/html/public;
    index index.php index.html;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
        autoindex off;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # SEGURIDAD: Bloquear archivos sensibles
    # ============================================
    location ~ /(\.env|\.git|composer\.lock|package-lock\.json|phpinfo\.php) {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    # ============================================
    # ARCHIVOS ESTÁTICOS (servir directamente)
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|woff|woff2|ttf|eot|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    

    # ============================================
    # ROUTING PRINCIPAL (Laravel)
    # ============================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================
    # PROCESAR PHP vía PHP-FPM
    # ============================================
    location ~ \.php$ {
        # Seguridad: evitar ejecución de PHP en storage/uploads
        location ~ ^/storage/.*\.php$ {
            deny all;
        }

        fastcgi_pass php:9000;  # ← 'php' es el nombre del servicio en docker-compose
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Parámetros estándar de FastCGI
        include fastcgi_params;
        
        # Optimizaciones de rendimiento
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors on;
        
        # Timeouts (ajustar según tu app)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
    }

    # ============================================
    # DENEGAR ACCESO A ARCHIVOS INTERNOS
    # ============================================
    location ~ ^/(storage|bootstrap)/ {
        deny all;
        return 404;
    }

    # ============================================
    # HEALTH CHECK (para monitoreo/load balancer)
    # ============================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}